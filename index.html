<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormForge Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</head>
<body>

<div class="container">
  <div class="card">

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <form id="form">

      
      <div class="step active">
        <h2><i class="fa fa-user"></i> Personal Info</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <button type="button" class="next">Next</button>
      </div>


      <div class="step">
        <h2><i class="fa fa-lock"></i> Account</h2>
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirm" placeholder="Confirm Password">
        <div class="buttons">
          <button type="button" class="prev">Back</button>
          <button type="button" class="next">Next</button>
        </div>
      </div>

    
      <div class="step">
        <h2><i class="fa fa-code"></i> Skills</h2>
        <label><input type="checkbox" value="HTML"> HTML</label>
        <label><input type="checkbox" value="CSS"> CSS</label>
        <label><input type="checkbox" value="JS"> JavaScript</label>
        <button type="button" id="addExp">+ Add Experience</button>
        <div id="experience"></div>

        <div class="buttons">
          <button type="button" class="prev">Back</button>
          <button type="submit">Submit</button>
        </div>
      </div>

    </form>
  </div>

  <div class="preview" id="preview">
    <h3>Live Preview</h3>
    <p><b>Name:</b> <span id="p_name"></span></p>
    <p><b>Email:</b> <span id="p_email"></span></p>
    <p><b>Skills:</b> <span id="p_skills"></span></p>
    <p><b>Experience:</b> <span id="p_exp"></span></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
