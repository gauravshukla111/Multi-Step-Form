<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Multi-Step Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

  
  <div class="form-card">

    <div class="progress-container">
      <div class="progress" id="progress"></div>
    </div>

    <form id="form">


      <div class="step active">
        <h2>👤 Personal Info</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <button type="button" class="next">Next</button>
      </div>


      <div class="step">
        <h2>🔐 Account</h2>
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirm" placeholder="Confirm Password">
        <div class="buttons">
          <button type="button" class="prev">Back</button>
          <button type="button" class="next">Next</button>
        </div>
      </div>


      <div class="step">
        <h2>💻 Skills</h2>

        <div class="skills-grid">
          <label class="skill"><input type="checkbox" value="HTML"><span>HTML</span></label>
          <label class="skill"><input type="checkbox" value="CSS"><span>CSS</span></label>
          <label class="skill"><input type="checkbox" value="JavaScript"><span>JavaScript</span></label>
        </div>

        <h3>Experience</h3>
        <div id="experience"></div>
        <button type="button" id="addExp" class="add-btn">+ Add Experience</button>

        <div class="buttons">
          <button type="button" class="prev">Back</button>
          <button type="submit">Submit</button>
        </div>
      </div>

    </form>
  </div>

  <div class="preview-card">
    <button id="showSidebar" class="view-btn">📂 View Submitted Data</button>
 <!-- Live preview -->
    <h3>Live Preview</h3>
    <p><b>Name:</b> <span id="p_name">-</span></p>
    <p><b>Email:</b> <span id="p_email">-</span></p>
    <p><b>Skills:</b> <span id="p_skills">-</span></p>
    <p><b>Experience:</b> <span id="p_exp">-</span></p>
  </div>

</div>
 <!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <h3>Submitted Data</h3>
  <div id="finalData"></div>
  <button onclick="closeSidebar()">Close</button>
</div>


<script src="app.js">
</script>
</body>

</html>
