<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

   <div class="form-card">
    <div class="progress-container">
      <div class="progress" id="progress"></div>
    </div>

    <form id="form" novalidate>

      
      <div class="step active">
        <h2>👤 Personal Info</h2>

        <div class="input-group">
          <input type="text" id="name" required>
          <label>Full Name</label>
        </div>

        <div class="input-group">
          <input type="email" id="email" required>
          <label>Email</label>
        </div>

        <div class="input-group">
          <input type="file" id="image">
        </div>

        <button type="button" class="next">Next</button>
      </div>

      
      <div class="step">
        <h2>🔐 Account</h2>

        <div class="input-group">
          <input type="password" id="password" required>
          <label>Password</label>
         </div>

        <div class="input-group">
          <input type="password" id="confirm" required>
          <label>Confirm Password</label>
        </div>

        <div class="buttons">
          <button type="button" class="prev">Back</button>
          <button type="button" class="next">Next</button>
        </div>
      </div>

      
      <div class="step">
        <h2>💻 Skills</h2>

        <div class="skills-grid">
          <label class="skill"><input type="checkbox" value="HTML">HTML</label>
          <label class="skill"><input type="checkbox" value="CSS">CSS</label>
          <label class="skill"><input type="checkbox" value="JS">JS</label>
        </div>

        <h3>Experience</h3>
        <div id="experience"></div>
        <button type="button" id="addExp">+ Add</button>

        <div class="buttons">
          <button type="button" class="prev">Back</button>
          <button type="submit">Submit</button>
        </div>
      </div>

    </form>
  </div>

  
  <div class="preview-card">
    <button id="showSidebar">📂 View Data</button>

    <h3>Live Preview</h3>
    <p><b>Name:</b> <span id="p_name">-</span></p>
    <p><b>Email:</b> <span id="p_email">-</span></p>
    <p><b>Skills:</b> <span id="p_skills">-</span></p>
    <p><b>Experience:</b> <span id="p_exp">-</span></p>
    <img id="p_img" width="80" style="display:none;">
  </div>

</div>


<div class="sidebar" id="sidebar">
  <h3>Submitted Data</h3>
  <div id="finalData"></div>
  <button onclick="closeSidebar()">Close</button>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>

</html>
